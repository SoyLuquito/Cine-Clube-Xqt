<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cine Clube Xiquete · entrada</title>
    <!-- Favicon símbolo cinema -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fd77cb'%3E%3Cpath d='M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z'/%3E%3C/svg%3E" type="image/svg+xml">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="backdrop"></div>
    <main class="container">
        <!-- formulário de login -->
        <section id="login-section" class="card">
            <div class="brand">
                <svg class="icon-film" viewBox="0 0 24 24" fill="none" stroke="#fd77cb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M8 4v16M16 4v16M2 8h4M2 12h4M2 16h4M18 8h4M18 12h4M18 16h4"/>
                </svg>
                <h1>Cine Clube Xiquete</h1>
            </div>
            <form id="login-form" autocomplete="off">
                <div class="input-group">
                    <label for="login-login">login</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="login-login" placeholder="seu login" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="login-senha">senha</label>
                    <div class="input-wrapper password-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="login-senha" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" aria-label="ver/esconder senha">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="remember-group">
                    <label class="remember-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Lembrar de mim
                    </label>
                </div>
                <button type="submit" class="btn-primary">entrar</button>
                <p class="toggle-action">Ainda não tem conta? <a href="#" id="go-to-register">cadastre-se</a></p>
            </form>
        </section>

        <!-- formulário de cadastro -->
        <section id="register-section" class="card hidden">
            <div class="brand">
                <svg class="icon-film" viewBox="0 0 24 24" fill="none" stroke="#fd77cb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M8 4v16M16 4v16M2 8h4M2 12h4M2 16h4M18 8h4M18 12h4M18 16h4"/>
                </svg>
                <h1>Cine Clube Xiquete</h1>
            </div>
            <form id="register-form" autocomplete="off">
                <div class="input-group">
                    <label for="reg-nome">nome</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="reg-nome" placeholder="seu nome" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-email">email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="reg-email" placeholder="usuario@dominio.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-login">login</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="reg-login" placeholder="escolha um login" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-senha">senha</label>
                    <div class="input-wrapper password-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="reg-senha" placeholder="mínimo 6 caracteres" required>
                        <button type="button" class="toggle-password" aria-label="ver/esconder senha">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-confirma">confirme a senha</label>
                    <div class="input-wrapper password-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="reg-confirma" placeholder="digite novamente" required>
                        <button type="button" class="toggle-password" aria-label="ver/esconder senha">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">criar conta</button>
                <p class="toggle-action">Já tem conta? <a href="#" id="go-to-login">faça login</a></p>
            </form>
        </section>
    </main>

    <div id="notification-container"></div>

    <!-- Firebase SDKs -->
    <script type="module" src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"></script>
    
    <script type="module" src="index.js"></script>
</body>
</html>
